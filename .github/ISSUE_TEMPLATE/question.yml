name: Question
description: Ask about usage, integration, or project direction.
title: "[Question]: "
labels: ["question"]
body:
  - type: dropdown
    id: area
    attributes:
      label: Area
      options:
        - Installation
        - Review shell usage
        - Adapter setup
        - Supabase setup
        - Host project integration
        - Public API
        - Roadmap
        - Other
    validations:
      required: true

  - type: textarea
    id: question
    attributes:
      label: Question
      description: What do you want to know?
    validations:
      required: true

  - type: textarea
    id: context
    attributes:
      label: Context
      description: Share the project setup, route, package version, or related code if useful.
